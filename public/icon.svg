<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2e0a"/>
      <stop offset="100%" stop-color="#0a1a05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Tea cup body -->
  <path d="M60 100 h100 v10 q0 60-50 70 q-50-10-50-70 z" fill="url(#accent)" opacity="0.9"/>
  <!-- Tea cup handle -->
  <path d="M160 110 q30 0 30 30 q0 30-30 30" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <!-- Steam / quill lines -->
  <path d="M90 90 q5-15 0-25 q-5-15 0-25" fill="none" stroke="#a3e635" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M110 85 q5-15 0-25 q-5-15 0-25" fill="none" stroke="#a3e635" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M130 90 q5-15 0-25 q-5-15 0-25" fill="none" stroke="#a3e635" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Pen/quill nib pointing into cup -->
  <path d="M170 50 l-40 50 l-5-5 l40-48 z" fill="#a3e635" opacity="0.8"/>
  <line x1="128" y1="93" x2="170" y2="50" stroke="#65a30d" stroke-width="2"/>
  <!-- NT text -->
  <text x="128" y="228" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#a3e635" letter-spacing="4">NT</text>
</svg>
